<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Dashboard</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111827;
color:white;
}

header{
background:#2563eb;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:15px;
text-align:center;
}

.number{
font-size:34px;
color:#FFD700;
font-weight:bold;
}

.title{
margin-top:10px;
}
</style><link rel="stylesheet" href="style.css">

</head>

<body>

<header>
👨‍💼 Admin Dashboard
</header>

<div class="grid">

<div class="card">
<div class="number">124</div>
<div class="title">Bookings</div>
</div>

<div class="card">
<div class="number">18</div>
<div class="title">Drivers</div>
</div>

<div class="card">
<div class="number">12</div>
<div class="title">Vehicles</div>
</div>

<div class="card">
<div class="number">₹2.4L</div>
<div class="title">Revenue</div>
</div>

</div>

</body>
</html>
