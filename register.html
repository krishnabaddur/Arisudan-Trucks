<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register - Arisudan Trucks</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111827;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:90%;
max-width:400px;
background:#1f2937;
padding:25px;
border-radius:15px;
}

h2{
text-align:center;
color:#FFD700;
margin-bottom:20px;
}

input,select{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#FFD700;
color:#000;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

a{
color:#FFD700;
text-decoration:none;
}

p{
margin-top:15px;
text-align:center;
color:white;
}
</style>

</head>

<body>

<div class="card">

<h2>Create Account</h2>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="tel" placeholder="Mobile Number">

<input type="password" placeholder="Password">

<select>
<option>Customer</option>
<option>Driver</option>
</select>

<button onclick="location.href='dashboard.html'">
Create Account
</button>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

</body>
</html>
