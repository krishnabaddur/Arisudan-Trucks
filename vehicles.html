<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vehicles - Arisudan Trucks</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111827;
color:white;
}

header{
background:#FFD700;
color:black;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

.card{
background:#1f2937;
padding:20px;
border-radius:12px;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
background:#FFD700;
color:black;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.status{
color:#22c55e;
font-weight:bold;
}
</style>

</head>

<body>

<header>🚚 Vehicle Fleet</header>

<div class="container">

<div class="card">
<h3>3 Wheeler</h3>
<p>Capacity : 500 Kg</p>
<p class="status">Available</p>
<button>Select Vehicle</button>
</div>

<div class="card">
<h3>Mini Truck</h3>
<p>Capacity : 1 Ton</p>
<p class="status">Available</p>
<button>Select Vehicle</button>
</div>

<div class="card">
<h3>Truck 5 Ton</h3>
<p>Capacity : 5 Ton</p>
<p class="status">Available</p>
<button>Select Vehicle</button>
</div>

</div>

</body>
</html>
