<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
max-width:500px;
padding:30px;
}

h1{
font-size:80px;
color:#FFD700;
margin-bottom:20px;
}

h2{
margin-bottom:15px;
}

p{
color:#d1d5db;
margin-bottom:30px;
}

a{
display:inline-block;
padding:15px 30px;
background:#FFD700;
color:#000;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

a:hover{
opacity:0.9;
}
</style>

</head>

<body>

<div class="container">

<h1>404</h1>

<h2>Page Not Found</h2>

<p>The page you are looking for doesn't exist.</p>

<a href="index.html">Go to Home</a>

</div>

</body>
</html>
