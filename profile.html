<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Profile</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111827;
color:white;
}

header{
background:#FFD700;
color:black;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
max-width:450px;
margin:auto;
}

.profile{
text-align:center;
margin:30px 0;
}

.avatar{
width:100px;
height:100px;
border-radius:50%;
background:#FFD700;
color:black;
font-size:42px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-weight:bold;
}

.card{
background:#1f2937;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.row{
margin:15px 0;
}

label{
color:#FFD700;
display:block;
margin-bottom:5px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:#FFD700;
color:black;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
</style>

</head>

<body>

<header>👤 My Profile</header>

<div class="container">

<div class="profile">
<div class="avatar">A</div>
<h2>Arisudan User</h2>
<p>Customer Account</p>
</div>

<div class="card">

<div class="row">
<label>Full Name</label>
<input value="Arisudan User">
</div>

<div class="row">
<label>Email</label>
<input value="user@email.com">
</div>

<div class="row">
<label>Phone</label>
<input value="+91 9876543210">
</div>

<button>Save Changes</button>

</div>

</div>

</body>
</html>
