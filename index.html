<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arisudan Trucks</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:420px;
text-align:center;
}

.logo{
font-size:60px;
margin-bottom:10px;
}

h1{
font-size:36px;
color:#FFD700;
margin-bottom:10px;
}

p{
margin-bottom:30px;
color:#ddd;
}

button{
width:100%;
padding:16px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.customer{
background:#FFD700;
color:#000;
}

.driver{
background:#16a34a;
color:#fff;
}

.admin{
background:#2563eb;
color:#fff;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">🚛</div>

<h1>Arisudan Trucks</h1>

<p>Book • Track • Deliver</p>

<button class="customer">Customer Login</button>

<button class="driver">Driver Login</button>

<button class="admin">Admin Login</button>

</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
